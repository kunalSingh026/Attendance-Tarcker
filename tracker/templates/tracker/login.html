{% block content %}
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #0c0c0f;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .bento-grid {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 12px;
    max-width: 900px;
    width: 100%;
  }

  .bento-card {
    background: #141418;
    border: 1px solid #1e1e26;
    border-radius: 20px;
    padding: 28px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s ease;
  }

  /* Card 1: Brand block */
  .card-brand {
    grid-column: 1 / 5;
    grid-row: 1 / 3;
    background: linear-gradient(145deg, #141418, #1a1a28);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-height: 340px;
  }

  .card-brand::before {
    content: '';
    position: absolute;
    bottom: -80px; left: -80px;
    width: 240px; height: 240px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 70%);
  }

  .brand-top .mono-tag {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: #6366f1;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .brand-top .mono-tag::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #6366f1;
    display: inline-block;
  }

  .brand-top h2 {
    font-size: 28px;
    font-weight: 700;
    color: #f4f4f8;
    letter-spacing: -0.8px;
    line-height: 1.15;
  }

  .brand-top p {
    font-size: 13px;
    color: #6b6b80;
    margin-top: 10px;
    line-height: 1.6;
  }

  .brand-bottom .stat-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #0f0f14;
    border: 1px solid #1e1e26;
    border-radius: 10px;
    padding: 10px 14px;
  }

  .brand-bottom .stat-num {
    font-size: 22px;
    font-weight: 700;
    color: #22d3a0;
    font-family: 'DM Mono', monospace;
  }

  .brand-bottom .stat-txt {
    font-size: 11px;
    color: #6b6b80;
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Card 2: Login form */
  .card-form {
    grid-column: 5 / 13;
    grid-row: 1 / 2;
    padding: 36px 40px;
  }

  .form-header {
    margin-bottom: 28px;
  }

  .form-header h3 {
    font-size: 22px;
    font-weight: 700;
    color: #f4f4f8;
    letter-spacing: -0.5px;
  }

  .form-header p {
    font-size: 13px;
    color: #6b6b80;
    margin-top: 4px;
  }

  .form-group {
    margin-bottom: 18px;
  }

  .form-group label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    color: #8888a0;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
    font-family: 'DM Mono', monospace;
  }

  .input-wrap {
    position: relative;
  }

  .form-group input {
    width: 100%;
    padding: 13px 44px 13px 16px;
    background: #0f0f14;
    border: 1px solid #1e1e26;
    border-radius: 12px;
    color: #f4f4f8;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    transition: border-color 0.25s, box-shadow 0.25s;
    outline: none;
  }

  .form-group input::placeholder {
    color: #3a3a4e;
  }

  .form-group input:focus {
    border-color: #6366f1;
    box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    background: #111118;
  }

  .input-icon {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: #3a3a4e;
    pointer-events: none;
  }

  .submit-btn {
    width: 100%;
    padding: 13px;
    background: #6366f1;
    border: none;
    border-radius: 12px;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.3px;
    transition: background 0.25s, transform 0.2s, box-shadow 0.25s;
    margin-top: 6px;
    box-shadow: 0 4px 20px rgba(99,102,241,0.3);
  }

  .submit-btn:hover {
    background: #5254cc;
    transform: translateY(-1px);
    box-shadow: 0 6px 24px rgba(99,102,241,0.4);
  }

  /* Card 3: Signup link */
  .card-link {
    grid-column: 5 / 13;
    grid-row: 2 / 3;
    background: #0f0f14;
    border-color: #1a1a22;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 32px;
    min-height: 0;
  }

  .link-text {
    font-size: 13px;
    color: #6b6b80;
  }

  .link-action {
    display: flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    background: #1e1e2e;
    border: 1px solid #2a2a40;
    border-radius: 10px;
    padding: 9px 18px;
    font-size: 13px;
    font-weight: 600;
    color: #8b8df8;
    transition: background 0.2s, color 0.2s;
  }

  .link-action:hover {
    background: #25253a;
    color: #a5a6ff;
  }

  @media (max-width: 680px) {
    .bento-grid { grid-template-columns: 1fr; }
    .card-brand { grid-column: 1; grid-row: 1; min-height: 180px; }
    .card-form { grid-column: 1; grid-row: 2; padding: 28px 24px; }
    .card-link { grid-column: 1; grid-row: 3; }
  }
</style>

<div class="bento-grid">

  <!-- Brand -->
  <div class="bento-card card-brand">
    <div class="brand-top">
      <h2>Welcome<br>Back</h2>
      <p>Sign in to continue tracking your academic attendance.</p>
    </div>
    <div class="brand-bottom">
      <div class="stat-badge">
        <span class="stat-num">75%</span>
        <span class="stat-txt">Min Req.</span>
      </div>
    </div>
  </div>

  <!-- Login Form -->
  <div class="bento-card card-form">
    <div class="form-header">
      <h3>Sign In</h3>
      <p>Please enter your credentials to continue</p>
    </div>

    <form method="POST">
      {% csrf_token %}

      <div class="form-group">
        <label for="username">Username</label>
        <div class="input-wrap">
          <input type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="username">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
      </div>

      <button type="submit" class="submit-btn">Sign In →</button>
    </form>
  </div>

  <!-- Signup Link -->
  <div class="bento-card card-link">
    <span class="link-text">Don't have an account?</span>
    <a href="{% url 'signup' %}" class="link-action">Create one ↗</a>
  </div>

</div>
{% endblock %}
