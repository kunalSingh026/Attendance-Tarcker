<!-- {% extends 'tracker/base.html' %} -->

{% block content %}
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #0c0c0f;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .bento-grid {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    grid-template-rows: auto;
    gap: 12px;
    max-width: 960px;
    width: 100%;
  }

  .bento-card {
    background: #141418;
    border: 1px solid #1e1e26;
    border-radius: 20px;
    padding: 28px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s ease, transform 0.3s ease;
  }

  .bento-card:hover {
    border-color: #2a2a38;
    transform: translateY(-2px);
  }

  /* Card 1: Hero title — spans 8 cols, full height left */
  .card-hero {
    grid-column: 1 / 9;
    grid-row: 1 / 3;
    background: linear-gradient(135deg, #141418 0%, #1a1a24 100%);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    min-height: 300px;
    padding: 40px;
  }

  .card-hero::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 280px; height: 280px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(99, 102, 241, 0.18) 0%, transparent 70%);
    pointer-events: none;
  }

  .card-hero .label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: #6366f1;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-hero .label::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #6366f1;
  }

  .card-hero h1 {
    font-size: clamp(36px, 5vw, 56px);
    font-weight: 700;
    color: #f4f4f8;
    line-height: 1.05;
    letter-spacing: -1.5px;
    margin-bottom: 16px;
  }

  .card-hero p {
    font-size: 16px;
    color: #6b6b80;
    line-height: 1.6;
    max-width: 340px;
    font-weight: 400;
  }

  /* Card 2: Get Started CTA */
  .card-cta-primary {
    grid-column: 9 / 13;
    grid-row: 1 / 2;
    background: #6366f1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-height: 140px;
    cursor: pointer;
    text-decoration: none;
  }

  .card-cta-primary:hover {
    background: #5557e0;
    transform: translateY(-3px);
  }

  .card-cta-primary .cta-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .card-cta-primary .cta-title {
    font-size: 24px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.5px;
  }

  .card-cta-primary .cta-arrow {
    font-size: 28px;
    color: rgba(255,255,255,0.7);
    align-self: flex-end;
  }

  /* Card 3: Log In CTA */
  .card-cta-secondary {
    grid-column: 9 / 13;
    grid-row: 2 / 3;
    background: #141418;
    border: 1px solid #1e1e26;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-height: 140px;
    cursor: pointer;
    text-decoration: none;
  }

  .card-cta-secondary:hover {
    border-color: #6366f1;
    transform: translateY(-3px);
  }

  .card-cta-secondary .cta-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: #6b6b80;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .card-cta-secondary .cta-title {
    font-size: 24px;
    font-weight: 700;
    color: #f4f4f8;
    letter-spacing: -0.5px;
  }

  .card-cta-secondary .cta-arrow {
    font-size: 28px;
    color: #6366f1;
    align-self: flex-end;
  }

  /* Card 4: Stat — attendance */
  .card-stat-1 {
    grid-column: 1 / 4;
    grid-row: 3 / 4;
    background: #0f1117;
    border-color: #1a1a26;
  }

  .card-stat-1 .stat-num {
    font-size: 48px;
    font-weight: 700;
    color: #22d3a0;
    letter-spacing: -2px;
    line-height: 1;
    margin-bottom: 6px;
  }

  .card-stat-1 .stat-label {
    font-size: 12px;
    color: #6b6b80;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-family: 'DM Mono', monospace;
  }

  /* Card 5: Feature tag */
  .card-tag {
    grid-column: 4 / 8;
    grid-row: 3 / 4;
    background: #0f1117;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 22px 28px;
  }

  .tag-icon {
    width: 44px; height: 44px;
    border-radius: 12px;
    background: #1e1e2e;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .tag-text .tag-title {
    font-size: 14px;
    font-weight: 600;
    color: #f4f4f8;
    margin-bottom: 3px;
  }

  .tag-text .tag-sub {
    font-size: 12px;
    color: #6b6b80;
    font-family: 'DM Mono', monospace;
  }

  /* Card 6: Status pill */
  .card-status {
    grid-column: 8 / 13;
    grid-row: 3 / 4;
    background: #0d1a14;
    border-color: #0f2a1e;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 22px 28px;
  }

  .status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #22d3a0;
    box-shadow: 0 0 0 4px rgba(34, 211, 160, 0.2);
    flex-shrink: 0;
    animation: pulse-green 2s infinite;
  }

  @keyframes pulse-green {
    0%, 100% { box-shadow: 0 0 0 4px rgba(34, 211, 160, 0.2); }
    50% { box-shadow: 0 0 0 8px rgba(34, 211, 160, 0.08); }
  }

  .status-text {
    font-size: 14px;
    font-weight: 500;
    color: #22d3a0;
  }

  .status-sub {
    font-size: 11px;
    color: #3a5a4a;
    font-family: 'DM Mono', monospace;
    margin-top: 2px;
  }

  @media (max-width: 680px) {
    .bento-grid {
      grid-template-columns: 1fr 1fr;
    }
    .card-hero { grid-column: 1 / 3; grid-row: 1 / 2; min-height: 220px; }
    .card-cta-primary { grid-column: 1 / 2; grid-row: 2 / 3; }
    .card-cta-secondary { grid-column: 2 / 3; grid-row: 2 / 3; }
    .card-stat-1 { grid-column: 1 / 2; grid-row: 3 / 4; }
    .card-tag { grid-column: 2 / 3; grid-row: 3 / 4; }
    .card-status { grid-column: 1 / 3; grid-row: 4 / 5; }
  }
</style>

<div class="bento-grid">

  <!-- Hero -->
  <div class="bento-card card-hero">
    <div class="label">Academic Tool</div>
    <h1>Attendance<br>Tracker</h1>
    <p>Track your academic attendance effortlessly. Stay on top of every class, every course.</p>
  </div>

  <!-- Get Started -->
  <a href="{% url 'signup' %}" class="bento-card card-cta-primary">
    <div class="cta-label">New User</div>
    <div class="cta-title">Get Started</div>
    <div class="cta-arrow">↗</div>
  </a>

  <!-- Log In -->
  <a href="{% url 'login' %}" class="bento-card card-cta-secondary">
    <div class="cta-label">Returning</div>
    <div class="cta-title">Log In</div>
    <div class="cta-arrow">→</div>
  </a>

  <!-- Stat -->
  <div class="bento-card card-stat-1">
    <div class="stat-num">75%</div>
    <div class="stat-label">Min Required</div>
  </div>

  <!-- Feature -->
  <div class="bento-card card-tag">
    <div class="tag-icon">📊</div>
    <div class="tag-text">
      <div class="tag-title">Live Reports</div>
      <div class="tag-sub">Per-course stats</div>
    </div>
  </div>

  <!-- Status -->
  <div class="bento-card card-status">
    <div class="status-dot"></div>
    <div>
      <div class="status-text">System Active</div>
      <div class="status-sub">All services running</div>
    </div>
  </div>

</div>
{% endblock %}
